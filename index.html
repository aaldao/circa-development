<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circa Development</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0e0e0d;
      --paper: #f7f5f0;
      --accent: #b5916a;
      --muted: #888070;
      --rule: #d8d2c8;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono: 'DM Mono', monospace;
      --px: 24px;
    }

    @media (min-width: 640px) { :root { --px: 48px; } }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif);
      font-weight: 300;
      font-size: 17px;
      line-height: 1.7;
    }

    /* Desktop only cursor */
    /* no custom cursor */

    /* ── Layout ── */
    .container { max-width: 900px; margin: 0 auto; padding: 0 var(--px); }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px var(--px);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--paper);
      border-bottom: 1px solid transparent;
      transition: border-color 0.4s;
    }
    nav.scrolled { border-color: var(--rule); }

    .nav-brand {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* Nav links hidden on mobile, shown on tablet+ */
    .nav-links { display: none; gap: 28px; }
    @media (min-width: 640px) {
      .nav-links { display: flex; }
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--ink); }

    .lang-toggle {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--rule);
      color: var(--muted);
      padding: 5px 10px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .lang-toggle:hover { color: var(--ink); border-color: var(--ink); }

    /* ── Hero ── */
    #hero {
      display: flex; flex-direction: column; justify-content: flex-end;
      padding-top: 88px;
      padding-bottom: 64px;
      border-bottom: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
    }
    @media (min-width: 640px) {
      #hero { min-height: 100svh; padding-top: 120px; padding-bottom: 96px; }
    }

    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.9s 0.1s forwards;
    }

    .hero-title {
      font-size: clamp(44px, 11vw, 108px);
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fadeUp 0.9s 0.25s forwards;
    }
    .hero-title em { font-style: italic; color: var(--accent); }

    .hero-sub {
      margin-top: 28px;
      max-width: 480px;
      font-size: 16px;
      color: var(--muted);
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.9s 0.45s forwards;
    }
    @media (min-width: 640px) { .hero-sub { font-size: 17px; margin-top: 40px; } }

    .hero-cta {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
      opacity: 0;
      animation: fadeUp 0.9s 0.6s forwards;
    }
    @media (min-width: 480px) {
      .hero-cta { flex-direction: row; align-items: center; gap: 24px; margin-top: 48px; }
    }

    .btn-primary {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 14px 28px;
      text-decoration: none;
      display: inline-block;
      transition: background 0.25s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }

    .btn-ghost {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--ink); border-color: var(--ink); }

    #hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    /* ── Sections ── */
    section { padding: 72px 0; border-bottom: 1px solid var(--rule); }
    @media (min-width: 640px) { section { padding: 100px 0; } }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 36px;
    }
    @media (min-width: 640px) { .section-label { margin-bottom: 48px; } }

    /* ── Services ── */
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    @media (min-width: 600px) {
      .services-grid { grid-template-columns: 1fr 1fr; }
    }

    .service-item {
      padding: 28px 24px;
      border: 1px solid var(--rule);
      margin: -1px 0 0 -1px;
      transition: background 0.25s;
      position: relative;
      overflow: hidden;
    }
    @media (min-width: 640px) { .service-item { padding: 36px 40px; } }

    .service-item::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 0;
      background: var(--accent);
      transition: height 0.35s ease;
    }
    .service-item:hover { background: #f2ede6; }
    .service-item:hover::before { height: 100%; }

    /* Full-width last item on desktop grid */
    @media (min-width: 600px) {
      .service-item.full { grid-column: span 2; }
    }

    .service-number {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .service-title {
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    @media (min-width: 640px) { .service-title { font-size: 26px; } }

    .service-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Work ── */
    .work-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 8px;
    }
    @media (min-width: 600px) {
      .work-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
    }

    .project-card {
      border: 1px solid var(--rule);
      padding: 28px 24px;
      transition: border-color 0.3s, transform 0.3s;
    }
    @media (min-width: 640px) {
      .project-card { padding: 40px; }
      .project-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    }

    .project-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .project-name {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.0;
      margin-bottom: 14px;
    }
    @media (min-width: 640px) { .project-name { font-size: 38px; } }
    .project-name em { font-style: italic; }

    .project-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 24px;
    }

    .project-stack { display: flex; flex-wrap: wrap; gap: 8px; }
    .stack-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--rule);
      color: var(--muted);
    }

    /* ── About ── */
    #about .container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }
    @media (min-width: 700px) {
      #about .container { grid-template-columns: 1fr 1.4fr; gap: 72px; align-items: start; }
    }

    .about-title {
      font-size: 40px;
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    @media (min-width: 640px) { .about-title { font-size: 48px; } }
    .about-title em { font-style: italic; color: var(--accent); }

    .about-text { font-size: 16px; color: var(--muted); line-height: 1.8; }
    @media (min-width: 640px) { .about-text { font-size: 17px; } }
    .about-text p + p { margin-top: 18px; }

    /* ── Contact ── */
    #contact { border-bottom: none; }
    .contact-inner {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: flex-start;
    }
    @media (min-width: 640px) {
      .contact-inner { flex-direction: row; justify-content: space-between; align-items: flex-end; }
    }

    .contact-headline {
      font-size: clamp(32px, 8vw, 72px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    .contact-headline em { font-style: italic; color: var(--accent); }

    .contact-details { text-align: left; }
    @media (min-width: 640px) { .contact-details { text-align: right; } }

    .contact-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .contact-email {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 4px;
      transition: border-color 0.2s, color 0.2s;
      display: inline-block;
      word-break: break-all;
    }
    .contact-email:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Footer ── */
    footer {
      padding: 24px var(--px);
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid var(--rule);
    }
    @media (min-width: 480px) {
      footer { flex-direction: row; justify-content: space-between; align-items: center; gap: 0; }
    }
    footer span {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Lang fade ── */
    body.switching [data-i18n],
    body.switching [data-i18n-html] { opacity: 0; transition: opacity 0.18s; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: none; }
  </style>
</head>

      document.documentElement.lang = l;
      document.body.classList.add('switching');
      setTimeout(() => {
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const v = T[l][el.dataset.i18n];
          if (v !== undefined) el.textContent = v;
        });
        document.querySelectorAll('[data-i18n-html]').forEach(el => {
          const v = T[l][el.dataset.i18nHtml];
          if (v !== undefined) el.innerHTML = v;
        });
        document.getElementById('langToggle').textContent = l === 'en' ? 'ES' : 'EN';
        document.body.classList.remove('switching');
      }, 180);
    }

    applyLang(lang);

    document.getElementById('langToggle').addEventListener('click', () => {
      applyLang(lang === 'en' ? 'es' : 'en');
    });

    // Cursor removed - using system cursor

    // Nav scroll
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', scrollY > 40);
    });

    // Reveal
    const io = new IntersectionObserver(entries => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 80);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  </script>
</body>
</html>
